<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #f59e0b; /* Amber/Gold */
            --primary-hover: #d97706;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error-color: #ef4444;
            --success-color: #10b981;
            --border: #334155;
        }

        body {
            width: 360px;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            margin: 0;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .header h3 {
            margin: 0;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-right span {
            font-size: 11px;
            background: var(--border);
            padding: 2px 8px;
            border-radius: 99px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .icon-btn {
            background: transparent;
            border: none;
            padding: 4px;
            cursor: pointer;
            box-shadow: none;
            width: auto;
            color: var(--text-muted);
            font-size: 16px;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .icon-btn:hover {
            color: var(--primary);
            transform: scale(1.15) rotate(15deg);
            box-shadow: none;
        }

        /* Settings Panel styling */
        .settings-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-panel.hidden {
            display: none;
        }

        .settings-panel label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .settings-panel select {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
            cursor: pointer;
        }

        .settings-panel select:focus {
            border-color: var(--primary);
        }

        .settings-panel input {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }

        .settings-panel input:focus {
            border-color: var(--primary);
        }

        .settings-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 4px;
        }

        #save-settings-btn {
            width: auto;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            box-shadow: none;
            background: linear-gradient(135deg, var(--primary) 0%, #d97706 100%);
            color: #0f172a;
        }

        #save-settings-btn:hover {
            transform: none;
            box-shadow: 0 2px 6px rgba(245, 158, 11, 0.3);
        }

        .link-btn {
            font-size: 11px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .link-btn:hover {
            text-decoration: underline;
        }

        #settings-status {
            font-size: 11px;
            font-style: italic;
            margin-top: 2px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, #d97706 100%);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
            font-family: 'Outfit', sans-serif;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(245, 158, 11, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        #output {
            margin-top: 16px;
            padding: 14px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 320px;
            overflow-y: auto;
            font-size: 13.5px;
            line-height: 1.5;
            color: var(--text-main);
        }

        /* Custom Scrollbar for Chrome Extension Popup */
        #output::-webkit-scrollbar {
            width: 6px;
        }
        #output::-webkit-scrollbar-track {
            background: var(--card-bg);
            border-radius: 4px;
        }
        #output::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        #output::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Message Types styling */
        .loading {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            font-style: italic;
        }

        .loading::before {
            content: "";
            width: 14px;
            height: 14px;
            border: 2px solid var(--text-muted);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #fca5a5;
            background-color: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--error-color);
            padding: 8px 12px;
            border-radius: 4px;
        }

        .error strong {
            color: #ef4444;
        }

        .analysis {
            color: #e2e8f0;
        }
    </style>
</head>

<body>
    <div class="header">
        <h3>18xx Gemini Copilot</h3>
        <div class="header-right">
            <span>v1.0</span>
            <button id="settings-toggle" class="icon-btn" title="Configurar API Key">⚙️</button>
        </div>
    </div>

    <!-- Panel de Configuración Colapsable -->
    <div id="settings-panel" class="settings-panel hidden">
        <label for="provider-select">Proveedor de IA:</label>
        <select id="provider-select">
            <option value="openrouter" selected>OpenRouter (Gratuito / Recomendado)</option>
            <option value="gemini">Google AI Studio</option>
        </select>
        
        <label for="api-key-input" id="key-label">Tu API Key de OpenRouter:</label>
        <input type="password" id="api-key-input" placeholder="Pega tu clave sk-or-... aquí">
        <div class="settings-actions">
            <button id="save-settings-btn">Guardar</button>
            <a href="https://openrouter.ai/keys" id="get-key-link" target="_blank" class="link-btn">Obtener clave gratis ↗</a>
        </div>
        <div id="settings-status"></div>
    </div>

    <!-- Nombre de usuario a ayudar -->
    <div class="username-container" style="margin-bottom: 12px;">
        <label for="username-input" style="font-size: 12px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 6px;">Usuario a ayudar (opcional):</label>
        <input type="text" id="username-input" placeholder="Ej: HexAndOtter" style="background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text-main); font-family: inherit; font-size: 13px; outline: none; box-sizing: border-box; width: 100%;">
    </div>

    <button id="analyze-btn">Analizar Turno Actual</button>
    <div id="output">Haz clic en el botón para recibir consejos estratégicos...</div>
    <script src="popup.js"></script>
</body>

</html>
